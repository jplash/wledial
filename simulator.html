<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M5Dial WLED Simulator</title>
<style>
  :root {
    --bg:       #1a1a1a;
    --bg2:      #242424;
    --bg3:      #2e2e2e;
    --border:   rgba(255,255,255,0.12);
    --text:     #e8e8e8;
    --muted:    #888;
    --accent:   #4caf50;
    --danger:   #e05252;
    --info:     #5b9cf6;
    --warn:     #f5a623;
    --mono:     'Courier New', monospace;
    --sans:     system-ui, sans-serif;
    --radius:   8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; padding: 16px; }
  h1 { font-size: 15px; font-weight: 500; margin-bottom: 12px; color: var(--text); }

  /* Toolbar */
  .toolbar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 0;
    padding: 8px 10px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0; }
  .toolbar button { font-size: 12px; padding: 4px 12px; border-radius: 6px;
    border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; }
  .toolbar button:hover { background: var(--bg3); }
  .toolbar .run { background: rgba(76,175,80,0.15); color: var(--accent); border-color: rgba(76,175,80,0.4); }
  .toolbar .stop { background: rgba(224,82,82,0.12); color: var(--danger); border-color: rgba(224,82,82,0.3); }
  .toolbar .spacer { flex: 1; }
  .chip { font-size: 10px; font-family: var(--mono); padding: 2px 8px; border-radius: 6px;
    border: 1px solid var(--border); color: var(--muted); }
  #status { font-size: 11px; font-family: var(--mono); color: var(--muted); }

  /* Editor + serial */
  .body { display: flex; min-height: 400px; }
  textarea#code { flex: 1; font-family: var(--mono); font-size: 12px; line-height: 1.55;
    padding: 10px 12px; background: #111; color: #cdd; border: 1px solid var(--border);
    border-top: none; resize: none; outline: none; tab-size: 2; min-height: 380px; }
  .serial-pane { width: 220px; display: flex; flex-direction: column;
    border: 1px solid var(--border); border-top: none; border-left: none; }
  .pane-hdr { font-size: 10px; font-weight: 500; padding: 4px 8px; background: var(--bg2);
    border-bottom: 1px solid var(--border); color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  #serial { flex: 1; overflow-y: auto; font-family: var(--mono); font-size: 10.5px;
    padding: 5px 7px; background: #0d0d0d; }
  .sline { padding: 1px 0; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--muted); word-break: break-all; }
  .sline.err  { color: var(--danger); }
  .sline.sys  { color: var(--info); }
  .sline.http { color: var(--accent); }
  .sline.warn { color: var(--warn); }

  /* Footer hw row */
  .footer { display: flex; gap: 14px; padding: 10px 12px; background: var(--bg2);
    border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius);
    align-items: flex-start; flex-wrap: wrap; }
  .dial-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  canvas#dial { cursor: pointer; display: block; }
  .hw-label { font-size: 10px; color: var(--muted); text-align: center; }
  .enc-row { display: flex; gap: 5px; }
  .enc-btn { font-size: 12px; padding: 3px 8px; border-radius: 6px;
    border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; }
  .enc-btn:hover { background: var(--bg3); }
  #btnA.held { background: rgba(91,156,246,0.2); }

  /* WLED state */
  .wled-panel { flex: 1; min-width: 170px; }
  .wled-panel h4, .net-panel h4 { font-size: 10px; font-weight: 500; color: var(--muted);
    text-transform: uppercase; letter-spacing: .05em; margin-bottom: 7px; }
  .kv { display: flex; justify-content: space-between; gap: 8px; font-size: 11px; padding: 2px 0; }
  .kv .k { color: var(--muted); }
  .kv .v { font-family: var(--mono); font-weight: 500; }

  /* Network */
  .net-panel { min-width: 155px; }
  .net-row { display: flex; justify-content: space-between; font-size: 11px; padding: 3px 0;
    border-bottom: 1px solid var(--border); }
  .net-row .nk { color: var(--muted); }
  .net-row .nv { font-family: var(--mono); }
  .faults { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .tog { font-size: 11px; padding: 3px 9px; border-radius: 6px;
    border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; }
  .tog:hover { background: var(--bg3); }
  .tog.active { background: rgba(224,82,82,0.15); color: var(--danger); border-color: rgba(224,82,82,0.4); }
</style>
</head>
<body>
<h1>M5Dial WLED Remote — Simulator</h1>

<div class="toolbar">
  <button class="run" onclick="runCode()">▶ Upload &amp; Run</button>
  <button class="stop" onclick="stopCode()">■ Stop</button>
  <button onclick="resetAll()">↺ Reset</button>
  <button onclick="loadFirmware()">Load firmware</button>
  <div class="spacer"></div>
  <span class="chip">ESP32-S3 · M5Dial</span>
  <span id="status">idle</span>
</div>

<div class="body">
  <textarea id="code" spellcheck="false">// Paste firmware here, or click "Load firmware"
// Then press ▶ Upload & Run
</textarea>
  <div class="serial-pane">
    <div class="pane-hdr">Serial monitor</div>
    <div id="serial"></div>
  </div>
</div>

<div class="footer">
  <div class="dial-wrap">
    <canvas id="dial" width="240" height="240"></canvas>
    <div class="enc-row">
      <button class="enc-btn" onclick="rotEnc(-10)">«</button>
      <button class="enc-btn" onclick="rotEnc(-1)">‹</button>
      <button class="enc-btn" id="btnA"
        onmousedown="btnDown()" onmouseup="btnUp()"
        ontouchstart="btnDown(event)" ontouchend="btnUp(event)">●</button>
      <button class="enc-btn" onclick="rotEnc(1)">›</button>
      <button class="enc-btn" onclick="rotEnc(10)">»</button>
    </div>
    <div class="hw-label">encoder ‹ › | button ●</div>
  </div>

  <div class="wled-panel">
    <h4>WLED state (mock)</h4>
    <div class="kv"><span class="k">power</span><span class="v" id="ws-on">ON</span></div>
    <div class="kv"><span class="k">bri</span><span class="v" id="ws-bri">128</span></div>
    <div class="kv"><span class="k">cct</span><span class="v" id="ws-cct">—</span></div>
    <div class="kv"><span class="k">col</span><span class="v" id="ws-hue">—</span></div>
    <div class="kv"><span class="k">fx</span><span class="v" id="ws-fx">Solid</span></div>
    <div class="kv"><span class="k">sx</span><span class="v" id="ws-sx">128</span></div>
    <div class="kv"><span class="k">ix</span><span class="v" id="ws-ix">128</span></div>
    <div class="kv"><span class="k">pal</span><span class="v" id="ws-pal">Default</span></div>
    <div class="kv"><span class="k">last POST</span><span class="v" id="ws-last">—</span></div>
    <div class="kv"><span class="k">HTTP</span><span class="v" id="ws-code">—</span></div>
  </div>

  <div class="net-panel">
    <h4>Network / faults</h4>
    <div class="net-row"><span class="nk">WiFi</span><span class="nv" id="net-wifi">connected</span></div>
    <div class="net-row"><span class="nk">WLED IP</span><span class="nv">192.168.1.100</span></div>
    <div class="net-row"><span class="nk">POSTs</span><span class="nv" id="net-posts">0</span></div>
    <div class="net-row"><span class="nk">GETs</span><span class="nv" id="net-gets">0</span></div>
    <div class="faults">
      <button class="tog" id="tog-wifi" onclick="toggleFault('wifi')">Drop WiFi</button>
      <button class="tog" id="tog-wled" onclick="toggleFault('wled')">WLED 500</button>
      <button class="tog" id="tog-slow" onclick="toggleFault('slow')">Slow net</button>
    </div>
  </div>
</div>

<script>
// ─── Canvas ───────────────────────────────────────────────────────────────────
const cv = document.getElementById('dial'), ctx = cv.getContext('2d');
const CX = 120, CY = 120, R = 114;
const disp = { bg:'#000', textColor:'#fff', textSize:1, cmds:[], pixels:[], circles:[] };

function col565(r,g,b){ return ((r&0xF8)<<8)|((g&0xFC)<<3)|(b>>3); }
function from565(c){
  if(c===0) return '#000'; if(c===0xFFFF) return '#fff';
  return `rgb(${((c>>11)&0x1F)<<3},${((c>>5)&0x3F)<<2},${(c&0x1F)<<3})`;
}
function redraw(){
  ctx.clearRect(0,0,240,240);
  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.fillStyle=disp.bg; ctx.fill();
  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.strokeStyle='#444'; ctx.lineWidth=5; ctx.stroke();
  for(const p of disp.pixels){ ctx.fillStyle=p.c; ctx.fillRect(p.x,p.y,1.5,1.5); }
  for(const c of disp.circles){ ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2); ctx.fillStyle=c.col; ctx.fill(); }
  ctx.textAlign='center'; ctx.textBaseline='middle';
  for(const t of disp.cmds){
    ctx.font=`400 ${Math.max(9,10*(t.sz||1))}px system-ui,sans-serif`;
    ctx.fillStyle=t.col||disp.textColor; ctx.fillText(t.text,t.x,t.y);
  }
}

// ─── Hardware ─────────────────────────────────────────────────────────────────
let encCount=0, btnDown_=false, btnPressedAt=0, btnWasPressed=false, btnWasReleased=false;
const TOUCH_NONE=0, TOUCH=1, TOUCH_END=2, TOUCH_BEGIN=3, TOUCH_DRAG=13;
let touchDown_=false;
const touchDetail={
  x:0, y:0, prev_x:0, prev_y:0, base_x:0, base_y:0, state:TOUCH_NONE,
  deltaX(){ return this.x-this.prev_x; },
  deltaY(){ return this.y-this.prev_y; },
  isPressed(){ return (this.state & 1) !== 0; },
  wasPressed(){ return this.state === TOUCH_BEGIN; },
  wasClicked(){ return this.state === TOUCH_END; },
  wasReleased(){ return this.state === TOUCH_END; },
  isDragging(){ return this.state === TOUCH_DRAG; }
};
function rotEnc(d){ encCount+=d; slog(`[ENC] ${d>0?'+':''}${d} → ${encCount}`,'sys'); }
function btnDown(e){ if(e) e.preventDefault();
  btnDown_=true; btnPressedAt=Date.now(); btnWasPressed=true;
  document.getElementById('btnA').classList.add('held');
}
function btnUp(e){ if(e) e.preventDefault();
  btnDown_=false; btnWasReleased=true;
  document.getElementById('btnA').classList.remove('held');
  slog(`[BTN] release ${Date.now()-btnPressedAt}ms`,'sys');
}
function dialPoint(e){
  const r=cv.getBoundingClientRect();
  return {x:Math.round((e.clientX-r.left)*cv.width/r.width), y:Math.round((e.clientY-r.top)*cv.height/r.height)};
}
function touchSet(e,state){
  if(e) e.preventDefault();
  const p=dialPoint(e);
  touchDetail.prev_x=touchDetail.x; touchDetail.prev_y=touchDetail.y;
  touchDetail.x=p.x; touchDetail.y=p.y;
  if(state===TOUCH_BEGIN){ touchDetail.base_x=p.x; touchDetail.base_y=p.y; touchDown_=true; }
  if(state===TOUCH_END) touchDown_=false;
  touchDetail.state=state;
  slog(`[TOUCH] ${p.x},${p.y}`,'sys');
}
cv.addEventListener('pointerdown', e => { cv.setPointerCapture(e.pointerId); touchSet(e, TOUCH_BEGIN); });
cv.addEventListener('pointermove', e => { if(touchDown_) touchSet(e, TOUCH_DRAG); });
cv.addEventListener('pointerup',   e => { touchSet(e, TOUCH_END); setTimeout(()=>{ if(!touchDown_&&touchDetail.state===TOUCH_END) touchDetail.state=TOUCH_NONE; }, 50); });
cv.addEventListener('pointercancel', e => { touchDown_=false; touchDetail.state=TOUCH_NONE; });

// ─── Mock WLED backend ────────────────────────────────────────────────────────
const EFFECTS=['Solid','Blink','Breathe','Wipe','Meteor','Rainbow','Chase','Twinkle',
  'Colorloop','Theater','Fireworks','Lightning','Ripple','Plasma','Pacifica','Sunrise',
  'Candle','Noise','Ripple Rainbow','Fire 2012','BPM','Juggle','Running','Sinelon',
  'Beat','Strobe','Dark Sparkle','Lighthouse'];
const PALETTES=['Default','* Random Cycle','* Color 1','* Colors 1&2','* Color Gradient',
  'Rainbow','Lava','Forest','Sunset','Party','Ocean','Tiamat','April Night','Orangery',
  'Sakura','Vintage','Departure','Landscape','Beech','Sherbet','Hult','Hult 64',
  'Drywet','Jul','Grintage','Rewhi','Tertiary','Fire','Icefire','Cyane','Light Pink',
  'Autumn','Magenta','Magred','Yelmag','Yelblu','Orange & Teal','Tiamat','April Night'];
let mockW = { on:true, bri:128, cct:128, fx:0, sx:128, ix:128, pal:0, col:[[255,160,0]] };
let postCnt=0, getCnt=0;
const fault = { wifi:false, wled:false, slow:false };

function toggleFault(f){
  fault[f]=!fault[f];
  document.getElementById('tog-'+f).classList.toggle('active', fault[f]);
  if(f==='wifi') document.getElementById('net-wifi').textContent = fault.wifi ? 'DROPPED' : 'connected';
  slog(`[NET] fault "${f}" ${fault[f]?'ON':'OFF'}`,'warn');
}
function mockPost(url, body){
  postCnt++; document.getElementById('net-posts').textContent=postCnt;
  if(fault.wifi) return {code:-1, payload:''};
  if(fault.wled) return {code:500, payload:'Server Error'};
  try{
    const o=JSON.parse(body);
    if(o.on!==undefined) mockW.on=o.on;
    if(o.bri!==undefined) mockW.bri=o.bri;
    if(o.cct!==undefined) mockW.cct=o.cct;
    if(o.seg&&o.seg[0]){ const s=o.seg[0]; if(s.fx!==undefined) mockW.fx=s.fx; if(s.sx!==undefined) mockW.sx=s.sx; if(s.ix!==undefined) mockW.ix=s.ix; if(s.pal!==undefined) mockW.pal=s.pal; if(s.col) mockW.col=s.col; }
    refreshWLEDUI(body);
  }catch(e){}
  return {code:200, payload:'{"success":true}'};
}
function mockGet(url){
  getCnt++; document.getElementById('net-gets').textContent=getCnt;
  if(fault.wifi) return {code:-1, payload:''};
  if(fault.wled) return {code:500, payload:'Server Error'};
  if(url.endsWith('/json/eff'))      return {code:200, payload:JSON.stringify(EFFECTS)};
  if(url.endsWith('/json/palettes')) return {code:200, payload:JSON.stringify(PALETTES)};
  if(url.includes('/json')) return {code:200, payload:JSON.stringify({
    on:mockW.on, bri:mockW.bri, cct:mockW.cct,
    seg:[{fx:mockW.fx, sx:mockW.sx, ix:mockW.ix, pal:mockW.pal, col:mockW.col}]
  })};
  return {code:404, payload:''};
}
function refreshWLEDUI(lastBody){
  document.getElementById('ws-on').textContent  = mockW.on?'ON':'OFF';
  document.getElementById('ws-bri').textContent = mockW.bri;
  document.getElementById('ws-cct').textContent = mockW.cct;
  const c = mockW.col&&mockW.col[0];
  document.getElementById('ws-hue').textContent = c ? `rgb(${c[0]},${c[1]},${c[2]})` : '—';
  document.getElementById('ws-fx').textContent  = EFFECTS[mockW.fx]||`#${mockW.fx}`;
  document.getElementById('ws-sx').textContent  = mockW.sx;
  document.getElementById('ws-ix').textContent  = mockW.ix;
  document.getElementById('ws-pal').textContent = PALETTES[mockW.pal]||`#${mockW.pal}`;
  if(lastBody) document.getElementById('ws-last').textContent = lastBody.substring(0,28)+'…';
}

// ─── ArduinoJson shim ─────────────────────────────────────────────────────────
function makeDoc(){
  const _d={};
  return new Proxy({_raw:null},{
    get(t,p){
      if(p==='_raw') return t._raw;
      if(p==='_data') return _d;
      if(p==='createNestedArray') return(k)=>{_d[k]=[];return{
        createNestedObject:()=>{const o={};_d[k].push(o);return new Proxy(o,{get:(t,p)=>t[p],set:(t,p,v)=>{t[p]=v;return true;}});},
        add:(v)=>{_d[k].push(v);}
      };};
      if(p==='createNestedObject') return(k)=>{_d[k]={};return new Proxy(_d[k],{get:(t,p)=>t[p],set:(t,p,v)=>{t[p]=v;return true;}});};
      if(p==='getData') return()=>_d;
      if(p==='as') return()=>t._raw;
      return _d[p];
    },
    set(t,p,v){ if(p==='_raw'){t._raw=v;return true;} _d[p]=v; return true; }
  });
}
function deserializeJson(doc,str){
  try{ const p=JSON.parse(str); doc._raw=p; if(p&&typeof p==='object'&&!Array.isArray(p)) for(const k in p) doc[k]=p[k]; return false; }
  catch(e){ return true; }
}
function serializeJson(doc,ref){
  const s=JSON.stringify(doc._data||{});
  if(ref&&typeof ref==='object') ref.value=s;
  return s;
}

// ─── API builder ──────────────────────────────────────────────────────────────
function buildAPI(){
  const WL_CONNECTED=3;
  class HTTPClient{
    constructor(){ this._url=''; this._code=0; this._payload=''; }
    begin(url){ this._url=url; }
    addHeader(){}
    POST(body){
      slog(`HTTP POST ${this._url}`,'http'); slog(`  ${body.substring(0,60)}`,'http');
      const r=mockPost(this._url,body); this._code=r.code; this._payload=r.payload;
      document.getElementById('ws-code').textContent=r.code;
      slog(`  → ${r.code}`,'http'); return r.code;
    }
    GET(){
      slog(`HTTP GET ${this._url}`,'http');
      const r=mockGet(this._url); this._code=r.code; this._payload=r.payload;
      document.getElementById('ws-code').textContent=r.code;
      slog(`  → ${r.code} (${r.payload.length}B)`,'http'); return r.code;
    }
    getString(){ return this._payload||''; }
    end(){}
  }
  const WiFi={
    begin(s,p){ slog(`[WiFi] connecting to "${s}"…`,'sys'); },
    status(){ return fault.wifi?0:WL_CONNECTED; },
    localIP(){ return {toString:()=>'192.168.1.42'}; },
    WL_CONNECTED
  };
  const Display={
    setRotation(){}, setTextSize(n){ disp.textSize=n; },
    setTextDatum(){}, setTextFont(){},
    setTextColor(c,bg){ disp.textColor=from565(c); },
    fillScreen(c){ disp.bg=from565(c); disp.cmds=[]; disp.pixels=[]; disp.circles=[]; redraw(); },
    drawCenterString(text,x,y){ disp.cmds.push({text,x,y,col:disp.textColor,sz:disp.textSize}); redraw(); },
    drawString(text,x,y){ disp.cmds.push({text,x,y,col:disp.textColor,sz:disp.textSize}); redraw(); },
    fillCircle(x,y,r,c){ disp.circles.push({x,y,r,col:from565(c)}); redraw(); },
    drawPixel(x,y,c){ disp.pixels.push({x,y,c:from565(c)}); if(disp.pixels.length%50===0) redraw(); },
    color565:(r,g,b)=>col565(r,g,b), width:()=>240, height:()=>240,
  };
  const Encoder={ read(){ return encCount; }, getCount(){ return encCount; }, setCount(n){ encCount=n; }, write(n){ encCount=n; } };
  const Speaker={ tone(freq,dur){ slog(`[SPK] ♪ ${freq}Hz ${dur}ms`,'sys'); } };
  const BtnA={
    wasPressed(){ const v=btnWasPressed; btnWasPressed=false; return v; },
    wasReleased(){ const v=btnWasReleased; btnWasReleased=false; return v; },
    isPressed(){ return btnDown_; },
    pressedFor(ms){ return btnDown_&&(Date.now()-btnPressedAt)>=ms; }
  };
  const Touch={ getDetail(){ return touchDetail; }, getCount(){ return touchDown_ || touchDetail.state ? 1 : 0; } };
  const M5Dial={ Display, Encoder, Speaker, BtnA, Touch, update(){}, config(){return{};}, begin(){} };
  const M5={ config(){return{};} };
  const fonts={ FreeSansBold9pt7b:null, FreeSans9pt7b:null, FreeSansBold12pt7b:null, Font0:null, Orbitron_Light_32:null };
  const MDNS={
    _hosts:[
      {ip:'192.168.1.100', hostname:'wled-living-room', port:80},
      {ip:'192.168.1.101', hostname:'wled-bedroom',     port:80},
      {ip:'192.168.1.102', hostname:'wled-kitchen',     port:80},
    ],
    begin(){},
    queryService(svc,proto){
      slog(`[mDNS] scanning for _${svc}._${proto} — ${this._hosts.length} found`,'sys');
      return this._hosts.length;
    },
    address(i){ return {toString:()=>this._hosts[i].ip}; },
    IP(i){ return this.address(i); },
    hostname(i){ return this._hosts[i].hostname; },
    port(i){ return this._hosts[i].port; },
  };
  return {
    M5Dial, M5, WiFi, HTTPClient: (...a) => new HTTPClient(...a),
    MDNS,
    StaticJsonDocument:makeDoc, DynamicJsonDocument:makeDoc,
    deserializeJson, serializeJson,
    Serial:{ println:(t)=>slog(String(t)), print:(t)=>slog(String(t)), printf:(f,...a)=>slog(spf(f,...a)), begin(){} },
    millis:()=>Date.now(), delay(){},
    constrain:(v,lo,hi)=>Math.max(lo,Math.min(hi,v)),
    map:(v,il,ih,ol,oh)=>ol+(oh-ol)*((v-il)/(ih-il)),
    abs:Math.abs, min:Math.min, max:Math.max,
    cos:Math.cos, sin:Math.sin, sqrt:Math.sqrt, atan2:Math.atan2, pow:Math.pow, floor:Math.floor, ceil:Math.ceil, round:Math.round,
    DEG_TO_RAD:Math.PI/180, fonts, WL_CONNECTED, middle_center:4,
    String:(x)=>String(x), sizeof:()=>4, HIGH:1, LOW:0,
    snprintf:(buf,sz,fmt,...a)=>spf(fmt,...a),
  };
}

function spf(fmt,...args){
  let i=0;
  return String(fmt).replace(/%[sdifucx%]/g,m=>{
    if(m==='%%') return '%';
    const v=args[i++];
    if(m==='%d'||m==='%i') return Math.trunc(Number(v));
    if(m==='%f') return Number(v).toFixed(2);
    if(m==='%u') return Math.abs(Math.trunc(Number(v)));
    if(m==='%x') return Math.trunc(Number(v)).toString(16);
    return String(v);
  });
}

// ─── Transpiler ───────────────────────────────────────────────────────────────
function transpile(src){
  // 1. Strip comments (string-aware: skip // inside string literals)
  src = src.replace(/\/\*[\s\S]*?\*\//g,'');
  src = src.replace(/"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|\/\/[^\n]*/g,
    m => m[0] === '/' ? '' : m);
  // 2. Strip preprocessor lines
  src = src.replace(/^\s*#[^\n]*/gm,'');
  // 3. Pointer string types first (must precede general type pass)
  src = src.replace(/\bconst\s+char\s*\*+\s+/g,'let ');
  src = src.replace(/\bconst\s+char\s*\*+(\w)/g,'let $1');
  src = src.replace(/\bchar\s*\*+\s+/g,'let ');
  src = src.replace(/\bchar\s*\*+(\w)/g,'let $1');
  // 4. enums → numbered consts
  src = src.replace(/\benum\s+\w+\s*\{([^}]+)\}/g,(_,body)=>
    body.split(',').map(s=>s.trim()).filter(Boolean)
        .map((n,i)=>`const ${n.split('=')[0].trim()} = ${i};`).join('\n'));
  // 5. Remove struct bodies
  src = src.replace(/\bstruct\s+\w+\s*\{[^}]+\};?/g,'');
  // 6. Function definitions: TYPENAME FUNCNAME( → function FUNCNAME(
  //    Use word boundary + mandatory whitespace + word char to avoid over-matching
  const T = 'auto|void|int|uint8_t|uint16_t|uint32_t|int8_t|int16_t|int32_t|bool|float|double|char|long|short|String|byte|size_t|unsigned';
  src = src.replace(new RegExp(`(?:^|(?<=[;{}\\n]))\\s*(?:${T})\\s+(\\w+)\\s*\\(`, 'gm'),
    (_,name) => `function ${name}(`);
  // 6b. Strip C++ types (and leftover `let` from char* rule) from function parameters
  //     Must run after rule 6 adds `function` keywords, before rule 7 adds `let`
  src = src.replace(new RegExp(`\\bfunction\\s+(\\w+)\\s*\\(([^)]*)\\)`, 'g'), (m, name, params) => {
    let p = params.replace(/\blet\s+/g, '');
    p = p.replace(new RegExp(`\\b(?:${T})\\s+\\*?`, 'g'), '');
    p = p.replace(/\b(const|static|volatile)\s+/g, '');
    return `function ${name}(${p})`;
  });
  // 7. Variable declarations — require whitespace (not *) between type and name
  //    Also handle array declarators: type name[...] and type* name
  src = src.replace(new RegExp(`\\b(${T})\\s+\\*?(\\w+)(?:\\s*\\[[^\\]]*\\])?(?=\\s*[=;,])`, 'g'),
    (_,t,name) => `let ${name}`);
  // 7b. Strip array subscripts left on `let` declarations by the char* rules above
  src = src.replace(/\blet\s+(\w+)\s*\[[^\]]*\]/g,'let $1');
  // 7c. Class-type declarations not in T: ClassName var = ... → let var = ...
  //     Matches PascalCase type name followed by identifier and assignment
  src = src.replace(/\b([A-Z][A-Za-z0-9_]*)\s+(\w+)(?=\s*=)/g, (_,cls,name) => `let ${name}`);
  // 8. Clean up any leftover qualifiers before variable names
  src = src.replace(/\b(const|static|extern|volatile)\s+let\b/g,'let');
  src = src.replace(/\b(const|static|extern|volatile)\s+(?=\w)/g,'');
  // 9. Misc fixes
  // Strip C-style casts: (int)x, (float)y, (uint8_t)z → x, y, z
  src = src.replace(new RegExp(`\\((?:${T})\\)`, 'g'), '');
  // snprintf(buf, sz, fmt, ...) writes into buf in C — rewrite so the return value is assigned
  src = src.replace(/\bsnprintf\s*\(\s*(\w+)\s*,/g, (_,buf) => `${buf} = snprintf(${buf},`);
  src = src.replace(/\.c_str\(\)/g,'');
  src = src.replace(/\.length\(\)/g,'.length');
  src = src.replace(/\bNULL\b/g,'null');
  src = src.replace(/=\s*\{([^{}]*)\}/g,'= [$1]');
  return src;
}

// ─── Runner ───────────────────────────────────────────────────────────────────
let loopTimer=null;
function setStatus(s,cls){
  const el=document.getElementById('status'); el.textContent=s;
  el.style.color=cls==='ok'?'#4caf50':cls==='err'?'#e05252':'#888';
}
function slog(msg,cls=''){
  const log=document.getElementById('serial');
  const d=document.createElement('div'); d.className='sline'+(cls?' '+cls:'');
  const t=new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  d.textContent=`${t} ${msg}`; log.appendChild(d); log.scrollTop=log.scrollHeight;
  while(log.children.length>300) log.removeChild(log.firstChild);
}
function runCode(){
  stopCode();
  const src=document.getElementById('code').value;
  setStatus('compiling…'); slog('[SYS] Uploading…','sys');
  const js=transpile(src);
  const api=buildAPI();
  let setupFn,loopFn;
  try{
    const fn=new Function(...Object.keys(api), js+'\n;return{setup:typeof setup!="undefined"?setup:null,loop:typeof loop!="undefined"?loop:null};');
    const res=fn(...Object.values(api)); setupFn=res.setup; loopFn=res.loop;
  }catch(e){ setStatus('compile error','err'); slog('[ERR] '+e.message,'err'); return; }
  try{ if(setupFn) setupFn(); }catch(e){ setStatus('setup() error','err'); slog('[ERR] setup(): '+e.message,'err'); return; }
  setStatus('running','ok'); slog('[SYS] Running at 30Hz','sys');
  if(loopFn) loopTimer=setInterval(()=>{ try{loopFn();}catch(e){slog('[ERR] loop(): '+e.message,'err');stopCode();} },33);
}
function stopCode(){ if(loopTimer){clearInterval(loopTimer);loopTimer=null;} setStatus('stopped'); }
function resetAll(){
  stopCode();
  encCount=0; btnDown_=false; btnWasPressed=false; btnWasReleased=false; touchDown_=false; touchDetail.state=TOUCH_NONE;
  disp.bg='#000'; disp.textColor='#fff'; disp.cmds=[]; disp.pixels=[]; disp.circles=[];
  mockW={on:true,bri:128,cct:128,fx:0,sx:128,col:[[255,160,0]]};
  postCnt=0; getCnt=0;
  document.getElementById('net-posts').textContent='0';
  document.getElementById('net-gets').textContent='0';
  document.getElementById('ws-code').textContent='—';
  refreshWLEDUI(); redraw();
  slog('[SYS] Reset','sys'); setStatus('idle');
}

int hue16(int h){
  int r,g,b,s=h/60,f=(h%60)*255/60;
  if(s==0){r=255;g=f;b=0;}else if(s==1){r=255-f;g=255;b=0;}
  else if(s==2){r=0;g=255;b=f;}else if(s==3){r=0;g=255-f;b=255;}
  else if(s==4){r=f;g=0;b=255;}else{r=255;g=0;b=255-f;}
  return M5Dial.Display.color565(r,g,b);
}

void drawArc(float frac, int colour){
  for(int i=0;i<ARC_STEPS;i++){
    float angle=(ARC_START+(ARC_SWEEP*i)/ARC_STEPS)*DEG_TO_RAD;
    int c=(i/ARC_STEPS<=frac)?colour:0x2104;
    for(int t=0;t<ARC_THICK;t++){
      int r2=ARC_RAD-ARC_THICK/2+t;
      M5Dial.Display.drawPixel(ARC_CX+(int)(cos(angle)*r2),ARC_CY+(int)(sin(angle)*r2),c);
    }
  }
}

void discoverWLED(){
  controllerCount=0;
  MDNS.begin("m5dial");
  int n=MDNS.queryService("wled","tcp");
  int i=0;
  while(i<n&&controllerCount<8){
    ctrlName[controllerCount]=MDNS.hostname(i);
    ctrlIP[controllerCount]=MDNS.IP(i).toString();
    ctrlPort[controllerCount]=MDNS.port(i);
    controllerCount++; i++;
  }
}

void sendState(){
  if(WiFi.status()!=WL_CONNECTED){wifiOK=false;return;}
  String url="http://"+wledHost+":"+wledPort+"/json/state";
  HTTPClient http = HTTPClient();
  http.begin(url);
  http.addHeader("Content-Type","application/json");
  StaticJsonDocument doc = StaticJsonDocument(512);
  doc["on"]=wled_on; doc["bri"]=wled_bri;
  auto seg=doc.createNestedArray("seg");
  auto s=seg.createNestedObject();
  s["fx"]=wled_fxIdx; s["sx"]=wled_fxSpd; s["ix"]=wled_fxIntensity; s["pal"]=wled_palIdx;
  String body;
  body=serializeJson(doc,body);
  lastHttpCode=http.POST(body);
  http.end();
}

void fetchState(){
  if(WiFi.status()!=WL_CONNECTED)return;
  String url="http://"+wledHost+":"+wledPort+"/json/state";
  HTTPClient http = HTTPClient();
  http.begin(url);
  if(http.GET()==200){
    StaticJsonDocument doc = StaticJsonDocument(1024);
    if(!deserializeJson(doc,http.getString())){
      if(doc._raw.on!=undefined) wled_on=doc._raw.on;
      if(doc._raw.bri!=undefined) wled_bri=doc._raw.bri;
      Serial.println("State synced");
    }
  }
  http.end();
}

void fetchEffects(){
  if(WiFi.status()!=WL_CONNECTED)return;
  String url="http://"+wledHost+":"+wledPort+"/json/eff";
  HTTPClient http = HTTPClient();
  http.begin(url);
  if(http.GET()==200){
    auto raw=JSON.parse(http.getString());
    effectCount=0;
    int n=raw.length;
    while(effectCount<n&&effectCount<256){ effectNames[effectCount]=raw[effectCount]; effectCount++; }
    Serial.println("Loaded "+effectCount+" effects");
  }
  http.end();
}

void fetchPalettes(){

    while(paletteCount<n&&paletteCount<256){ paletteNames[paletteCount]=raw[paletteCount]; paletteCount++; }
    Serial.println("Loaded "+paletteCount+" palettes");

}

  if(currentMode<0) currentMode+=MODE_COUNT;
  Serial.println("Mode: "+MODE_LABELS[currentMode]);
  M5Dial.Speaker.tone(5000,20);

}

float touchArcFraction(int x,int y){
  float dx=x-ARC_CX, dy=y-ARC_CY;
  float dist=sqrt(dx*dx+dy*dy);
  if(dist<ARC_RAD-ARC_THICK-10||dist>ARC_RAD+ARC_THICK+10)return -1;
  return touchAngleFraction(x,y);
}

float touchAngleFraction(int x,int y){
  float dx=x-ARC_CX, dy=y-ARC_CY;
  float deg=atan2(dy,dx)/DEG_TO_RAD;
  if(deg<0)deg+=360;
  float along=deg-ARC_START;
  if(along<0)along+=360;
  if(along>ARC_SWEEP)return -1;
  return along/ARC_SWEEP;
}

bool handleListDrag(auto t){
  if(currentMode!=MODE_FX_SELECT&&currentMode!=MODE_FX_PALETTE)return false;
  int count=(currentMode==MODE_FX_SELECT)?effectCount:paletteCount;
  if(count<=0)return false;
  if(t.wasPressed())listDragAccumY=0;
  if(!t.isPressed())return false;
  listDragAccumY+=t.deltaY();
  int steps=listDragAccumY/LIST_DRAG_STEP_PX;
  if(steps==0)return true;
  listDragAccumY-=steps*LIST_DRAG_STEP_PX;
  if(currentMode==MODE_FX_SELECT) wled_fxIdx=((wled_fxIdx-steps)+effectCount*100)%effectCount;
  else wled_palIdx=((wled_palIdx-steps)+paletteCount*100)%paletteCount;
  pendingSend=true;
  drawDisplay();
  return true;
}

void setValueFraction(float frac){
  frac=constrain(frac,0,1);
  if(currentMode==MODE_BRIGHTNESS)      wled_bri=round(frac*255);
  else if(currentMode==MODE_COLOR_TEMP) wled_cct=1900+round(frac*(6500-1900));
  else if(currentMode==MODE_HUE)        wled_hue=round(frac*359);
  else if(currentMode==MODE_FX_SPEED)   wled_fxSpd=round(frac*255);
  else if(currentMode==MODE_FX_SELECT&&effectCount>0) wled_fxIdx=constrain(round(frac*(effectCount-1)),0,effectCount-1);
  else if(currentMode==MODE_FX_INTENSITY) wled_fxIntensity=round(frac*255);
  else if(currentMode==MODE_FX_PALETTE&&paletteCount>0) wled_palIdx=constrain(round(frac*(paletteCount-1)),0,paletteCount-1);
  else if(currentMode==MODE_FX_PALETTE) wled_palIdx=round(frac*255);
  pendingSend=true;
  drawDisplay();
}

void handleTouch(){
  auto t=M5Dial.Touch.getDetail();
  if(!t.isPressed()&&!t.wasClicked()&&!t.wasReleased()){
    arcTouchActive=false; listDragAccumY=0; return;
  }
  bool fresh=t.wasPressed();
  if(fresh){arcTouchActive=false;listDragAccumY=0;}
  bool wideNav=useWideNavButtons();
  int leftMin=wideNav?0:34;
  int leftMax=wideNav?52:84;
  int rightMin=wideNav?188:156;
  int rightMax=wideNav?239:206;
  if((fresh||millis()-lastTouchNav>=TOUCH_REPEAT_MS)&&t.y>=84&&t.y<=156){
    if(t.x>=leftMin&&t.x<=leftMax){
      lastTouchNav=millis();
      if(appState==STATE_SELECT&&controllerCount>0){selectionCursor=(selectionCursor+controllerCount-1)%controllerCount;drawDisplay();}
      else if(appState==STATE_CONTROL) changeMode(-1);
      return;
    }
    if(t.x>=rightMin&&t.x<=rightMax){
      lastTouchNav=millis();
      if(appState==STATE_SELECT&&controllerCount>0){selectionCursor=(selectionCursor+1)%controllerCount;drawDisplay();}
      else if(appState==STATE_CONTROL) changeMode(1);
      return;
    }
  }
  if(appState!=STATE_CONTROL||!wifiOK||!wled_on)return;
  if(handleListDrag(t))return;
  if(millis()-lastTouchSet<SEND_DEBOUNCE_MS)return;
  float frac=touchArcFraction(t.x,t.y);
  if(fresh&&frac>=0)arcTouchActive=true;
  if(arcTouchActive&&t.isPressed()){
    frac=touchAngleFraction(t.x,t.y);
    if(frac>=0){lastTouchSet=millis();setValueFraction(frac);}
  }
  if(t.wasReleased())arcTouchActive=false;
}

void setup(){
  Serial.begin(115200);
  M5Dial.begin(M5Dial.config(),true,false);
  M5Dial.Display.fillScreen(0);
  M5Dial.Display.setTextColor(0xFFFF);
  M5Dial.Display.drawCenterString("WLED Remote",120,104,null);
  M5Dial.Display.drawCenterString("Connecting...",120,128,null);
  WiFi.begin(WIFI_SSID,WIFI_PASSWORD);
  int attempts=0;
  while(WiFi.status()!=WL_CONNECTED&&attempts<20){attempts++;}
  if(WiFi.status()==WL_CONNECTED){
    wifiOK=true; Serial.println("WiFi OK");
    appState=STATE_SCANNING; drawDisplay();
    discoverWLED();
    if(controllerCount>0){
      appState=STATE_SELECT;
    }else{
      wledHost=WLED_DEFAULT_IP; wledPort=WLED_DEFAULT_PORT;
      appState=STATE_CONTROL;
      fetchEffects(); fetchPalettes(); fetchState();
    }
  }else{
    Serial.println("WiFi failed"); appState=STATE_CONTROL;
  }
  lastEnc=M5Dial.Encoder.read();
  drawDisplay();
}

void loop(){
  M5Dial.update();
  int enc=M5Dial.Encoder.read();
  int delta=enc-lastEnc; lastEnc=enc;

  if(appState==STATE_SELECT){
    if(delta!=0&&controllerCount>0){
      selectionCursor=((selectionCursor+delta)+controllerCount*100)%controllerCount;
      M5Dial.Speaker.tone(6000,15);
      drawDisplay();
    }
    handleTouch();
    if(M5Dial.BtnA.wasPressed()){
      wledHost=ctrlIP[selectionCursor]; wledPort=ctrlPort[selectionCursor];
      Serial.println("Selected: "+ctrlName[selectionCursor]+" @ "+wledHost);
      appState=STATE_CONTROL;
      fetchEffects(); fetchPalettes(); fetchState(); drawDisplay();
    }
    return;
  }

  if(delta!=0){
    if(currentMode==MODE_BRIGHTNESS)      wled_bri=constrain(wled_bri+delta*4,0,255);
    else if(currentMode==MODE_COLOR_TEMP) wled_cct=constrain(wled_cct+delta*100,1900,6500);
    else if(currentMode==MODE_HUE)        wled_hue=((wled_hue+delta*5)+720)%360;
    else if(currentMode==MODE_FX_SPEED)   wled_fxSpd=constrain(wled_fxSpd+delta*4,0,255);
    else if(currentMode==MODE_FX_SELECT&&effectCount>0) wled_fxIdx=((wled_fxIdx+delta)+effectCount*100)%effectCount;
    else if(currentMode==MODE_FX_INTENSITY) wled_fxIntensity=constrain(wled_fxIntensity+delta*4,0,255);
    else if(currentMode==MODE_FX_PALETTE&&paletteCount>0) wled_palIdx=((wled_palIdx+delta)+paletteCount*100)%paletteCount;
    else if(currentMode==MODE_FX_PALETTE) wled_palIdx=constrain(wled_palIdx+delta,0,255);
    M5Dial.Speaker.tone(8000,20);
    pendingSend=true; drawDisplay();
  }
  handleTouch();
  if(M5Dial.BtnA.wasPressed()){ btnHeld=true; btnPressAt=millis(); longFired=false; }
  if(btnHeld&&!longFired&&(millis()-btnPressAt>=LONG_PRESS_MS)){
    longFired=true; changeMode(1);
  }
  if(M5Dial.BtnA.wasReleased()){
    if(btnHeld&&!longFired){ wled_on=!wled_on; pendingSend=true; drawDisplay(); }
    btnHeld=false;
  }
  if(pendingSend&&wifiOK&&(millis()-lastSendMs>=SEND_DEBOUNCE_MS)){ sendState(); pendingSend=false; lastSendMs=millis(); }
  if(wifiOK&&(millis()-lastPollMs>=POLL_INTERVAL_MS)){ fetchState(); lastPollMs=millis(); drawDisplay(); }
}`;
  slog('[SYS] Firmware loaded — press ▶ Upload & Run','sys');
}

redraw(); refreshWLEDUI();
slog('[SYS] Simulator ready (open in any browser — no server needed)','sys');
</script>
